AllCops:
  NewCops: enable
  SuggestExtensions: false
  TargetRubyVersion: 4.0
  Exclude:
    - "pkg/**/*"
    - "tmp/**/*"
    - "target/**/*"
    - "rs/target/**/*"
    - "redis_poc/**/*"
    - "test/**/*"

Style/Documentation:
  Enabled: false

Style/StringLiterals:
  Enabled: false

Metrics/BlockLength:
  Exclude:
    - "Rakefile"
    - "*.gemspec"
