AllCops:
  NewCops: enable
  SuggestExtensions: false
  TargetRubyVersion: 4.0
  Exclude:
    - "pkg/**/*"
    - "tmp/**/*"
    - "target/**/*"
    - "rs/target/**/*"
    - "smoke_tests/**/*"
    - "test/**/*"

Style/Documentation:
  Enabled: false

Style/StringLiterals:
  Enabled: false

Metrics/MethodLength:
  Max: 15

Metrics/BlockLength:
  Exclude:
    - "Rakefile"
    - "*.gemspec"
