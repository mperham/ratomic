name: Gem Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish gems to RubyGems.org"
        required: true
        type: boolean
        default: false
      dry-run:
        description: "Build and verify release artifacts without publishing"
        required: true
        type: boolean
        default: true

permissions:
  contents: read

concurrency:
  group: gem-release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  test:
    name: Ruby ${{ matrix.ruby }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
        ruby:
          - "4.0"

    steps:
      - uses: actions/checkout@v6

      - name: Set up Ruby ${{ matrix.ruby }} and Rust
        uses: ./.github/actions/setup-ruby-rust
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true

      - name: Run Rust tests
        run: cargo test --workspace

      - name: Run Ruby tests
        env:
          RATOMIC_PERFORMANCE_TESTS: "1"
        run: bundle exec rake A="--verbose"

  package-ruby:
    name: Package ruby gem
    needs: test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Ruby and Rust
        uses: ./.github/actions/setup-ruby-rust
        with:
          ruby-version: "4.0"
          bundler-cache: true

      - name: Verify tag matches gem version
        if: github.event_name == 'push'
        run: |
          ruby -Ilib -rratomic/version -e 'abort("tag #{ENV.fetch("GITHUB_REF_NAME")} does not match gem version #{Ratomic::VERSION}") unless ENV.fetch("GITHUB_REF_NAME") == "v#{Ratomic::VERSION}"'

      - name: Build ruby gem
        run: bundle exec rake build

      - name: Upload ruby gem
        uses: actions/upload-artifact@v7
        with:
          name: gem-ruby
          path: pkg/*.gem
          if-no-files-found: error

  package-native:
    name: Package ${{ matrix.platform }} gem
    needs: test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        platform:
          - x86_64-linux
          - aarch64-linux
          # "You can't wall me Tim, I evolve!", exclaims Darwin
          - x86_64-darwin 
          - arm64-darwin
          # Darwin: 2, Tim: 0
          - x64-mingw-ucrt

    steps:
      - uses: actions/checkout@v6

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "4.0"
          bundler-cache: true

      - name: Build native gem
        uses: oxidize-rb/actions/cross-gem@v1
        with:
          platform: ${{ matrix.platform }}

      - name: Upload native gem
        uses: actions/upload-artifact@v7
        with:
          name: gem-${{ matrix.platform }}
          path: pkg/*.gem
          if-no-files-found: error


  dry-run:
    name: Dry run release artifacts
    needs:
      - package-ruby
      - package-native
    if: github.event_name == 'workflow_dispatch' && inputs['dry-run']
    runs-on: ubuntu-latest

    steps:
      - name: Download gem artifacts
        uses: actions/download-artifact@v7
        with:
          path: pkg/
          merge-multiple: true

      - name: Smoke test packaged ruby gem
        continue-on-error: true
        run: |
          set -euxo pipefail
          gem uninstall ratomic -aIx || true
          gem install --local pkg/ratomic*x86_64-linux.gem
          bundle info ratomic
          gem contents ratomic | sort
          ruby -e '
            require "ratomic"
            puts "version=#{Ratomic::VERSION}"
            puts "native_enabled=#{Ratomic.native_enabled?}"
            puts "counter=#{Ratomic::Counter.new.increment(1)}"
          '

      - name: Show gems for dry run
        run: find pkg -name "*.gem" -print | sort

  publish:
    name: Publish gems to RubyGems.org
    needs:
      - package-ruby
      - package-native
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.publish && !inputs['dry-run'])
    runs-on: ubuntu-latest
    permissions:
      id-token: write      # Required for Trusted Publishing OIDC authentication
      contents: write      # Allows writing/tagging if needed
    environment:
      name: release
      url: https://rubygems.org/gems/ratomic

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "4.0"
          bundler-cache: true

      - name: Download gem artifacts
        uses: actions/download-artifact@v7
        with:
          path: pkg/
          merge-multiple: true

      - name: Smoke test packaged ruby gem
        run: |
          tmpdir=$(mktemp -d)
          current_gem_path=$(ruby -e 'print Gem.path.join(":")')
          gem install --local --force --install-dir "$tmpdir" pkg/ratomic*x86_64-linux.gem
          GEM_HOME="$tmpdir" GEM_PATH="$tmpdir:$current_gem_path" ruby -e 'require "ratomic"; puts Ratomic::VERSION'

      # Authenticate with RubyGems via Trusted Publishing (OIDC)
      - name: Configure RubyGems Credentials
        uses: rubygems/configure-rubygems-credentials@v2.0.0

      # Push gems to rubygems.org
      - name: Publish Gems to RubyGems.org
        run: |          
          for gem in pkg/*.gem; do
            echo "Pushing $gem..."
            gem push "$gem"
          done

      - name: Await RubyGems availability
        run: timeout 300s gem exec rubygems-await -- pkg/*.gem || true
