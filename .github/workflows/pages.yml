name: API Docs

on:
  push:
    branches:
      - trunk
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build API docs
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Ruby and Rust
        uses: ./.github/actions/setup-ruby-rust
        with:
          ruby-version: "4.0"
          bundler-cache: true

      - name: Build YARD docs
        run: bundle exec rake yard

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: doc

  deploy:
    name: Deploy API docs
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
