name: Test

on:
  push:
    branches:
      - trunk
  pull_request:
    branches:
      - trunk

jobs:
  test:
    name: Ruby ${{ matrix.ruby }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
        ruby:
          - "3.4"

    steps:
      - uses: actions/checkout@v6

      - name: Set up Ruby ${{ matrix.ruby }} and Rust
        uses: ./.github/actions/setup-ruby-rust
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true

      - name: Run Rust tests
        run: cargo test --workspace

      - name: Compile extension and run the default task
        run: bundle exec rake
