services:
  redis:
    image: redis:7-alpine
    ports:
      - "${RATOMIC_REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  postgres:
    image: postgres:17-alpine
    ports:
      - "${RATOMIC_PG_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: ratomic_smoke
      POSTGRES_USER: ratomic
      POSTGRES_PASSWORD: ratomic
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ratomic -d ratomic_smoke"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  redis-data:
  postgres-data:
